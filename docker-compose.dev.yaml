services:
  postgres:
    image: postgres:16-alpine
    container_name: xqua-go-dev-postgres
    env_file: .env.dev
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - xqua_go_pg_data:/var/lib/postgresql/data
      - ./scripts/dev-postgres-init:/docker-entrypoint-initdb.d:ro

volumes:
  xqua_go_pg_data:
